[project]
site_name = "ember"
site_description = "A lightweight Fabric-based training library for PyTorch"
site_author = "Mitchell Cavanagh"
site_url = "https://mythcell.github.io/ember/"
repo_url = "https://github.com/Mythcell/ember"
copyright = "Copyright &copy; 2024-2026 Mitchell Cavanagh"

nav = [
  { "Home" = "index.md" },
  { "Getting Started" = [
    { "Installation" = "getting-started/installation.md" },
    { "Quickstart" = "getting-started/quickstart.md" },
  ] },
  { "Core" = [
    { "EmberModel" = "core/embermodel.md" },
    { "Data" = "core/data.md" },
    { "Tracking" = "core/tracking.md" },
    { "Callbacks" = "core/callbacks.md" },
    { "Runners" = "core/runners.md" },
  ] },
  { "Utils" = [
    { "Instantiation" = "utils/instantiation.md" },
    { "Training Helpers" = "utils/training-helpers.md" },
  ] },
  { "Examples" = [
    { "Custom Loops" = "examples/custom-loops.md" },
    { "MNIST VAE" = "examples/mnist-vae.md" },
  ] },
  { "CLI" = "cli.md" },
  { "API Reference" = "api.md" },
]

[project.theme]
language = "en"
features = [
  "content.code.copy",
  "navigation.footer",
  "navigation.sections",
  "navigation.path",
  "navigation.top",
  "search.highlight",
]

[[project.theme.palette]]
scheme = "slate"
toggle.icon = "lucide/sun"
toggle.name = "Switch to light mode"

[[project.theme.palette]]
scheme = "default"
toggle.icon = "lucide/moon"
toggle.name = "Switch to dark mode"

[project.markdown_extensions.admonition]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.def_list]
[project.markdown_extensions.footnotes]
[project.markdown_extensions.md_in_html]
[project.markdown_extensions.toc]
permalink = true
[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
line_spans = "__span"
pygments_lang_class = true
[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.snippets]
[project.markdown_extensions.pymdownx.superfences]
